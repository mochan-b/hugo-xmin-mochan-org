<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ .Title }} | {{ .Site.Title }}</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <!-- Set browser UI theme color to match system light/dark preference -->
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0b0b0b" media="(prefers-color-scheme: dark)">
    <link rel="stylesheet" href="{{ "css/style.css" | relURL }}?v={{ now.Unix }}" />
    <link rel="stylesheet" href="{{ "css/fonts.css" | relURL }}?v={{ now.Unix }}" />
    {{ partial "head_custom.html" . }}

    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>    
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']]
        },
        startup: {
          pageReady: () => {
            return MathJax.startup.defaultPageReady().then(() => {
              MathJax.typesetPromise();
            });
          }
        }
      };
      </script>
      <script id="MathJax-script" async src="/js/mathjax/es5/tex-mml-chtml.js"></script>
  </head>

  <body>
    <div class="site-header">
      <div class="site-header-brand">
        <div style="display: flex; align-items: center; justify-content: center; width: 80px; height: 80px; color: var(--text);">
          <img src="{{ "/images/logo_light.png" | relURL }}" alt="mochan.org logo" class="logo-light" style="width: 100%; height: 100%; object-fit: contain;">
          <img src="{{ "/images/logo_dark.png" | relURL }}" alt="mochan.org logo" class="logo-dark" style="width: 100%; height: 100%; object-fit: contain;">
        </div>
        <div class="site-header-text">
          <h2 style="margin: 0 0 0.2rem;">Mochan Shrestha  [mochan.org]</h2>
          Tutorials, Education, Learning and Knowledge
        </div>
      </div>
      <div class="site-header-controls">
        <button id="width-toggle" class="theme-toggle" aria-label="Toggle full width">
          <svg id="width-icon-full" style="display: none;" viewBox="0 0 24 24"><path d="M4 4h16v16H4V4zm2 2v12h12V6H6zM2 12h2v-2H2v2zm20 0h2v-2h-2v2zM12 2v2h-2V2h2zm0 20v2h-2v-2h2z"/></svg>
          <svg id="width-icon-constrained" style="display: none;" viewBox="0 0 24 24"><path d="M8 4h8v16H8V4zm2 2v12h4V6h-4zM4 12H2v-2h2v2zm16 0h2v-2h-2v2z"/></svg>
        </button>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
          <svg id="theme-icon-dark" style="display: none;" viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></svg>
          <svg id="theme-icon-light" style="display: none;" viewBox="0 0 24 24"><path d="M12 7a5 5 0 1 0 5 5 5 5 0 0 0-5-5zm0 8a3 3 0 1 1 3-3 3 3 0 0 1-3 3zm0-12a1 1 0 0 0 1-1V1a1 1 0 0 0-2 0v1a1 1 0 0 0 1 1zm0 20a1 1 0 0 0-1 1v1a1 1 0 0 0 2 0v-1a1 1 0 0 0-1-1zm8.485-16.071a1 1 0 0 0-1.414 0l-.707.707a1 1 0 0 0 1.414 1.414l.707-.707a1 1 0 0 0 0-1.414zM4.929 19.071a1 1 0 0 0-1.414 0l-.707.707a1 1 0 0 0 1.414 1.414l.707-.707a1 1 0 0 0 0-1.414zm16.071-7.071h-1a1 1 0 0 0 0 2h1a1 1 0 0 0 0-2zm-20 0h-1a1 1 0 0 0 0 2h1a1 1 0 0 0 0-2zm16.071 7.071a1 1 0 0 0 0 1.414l.707.707a1 1 0 0 0 1.414-1.414l-.707-.707a1 1 0 0 0-1.414 0zM4.929 4.929a1 1 0 0 0 0-1.414l-.707-.707a1 1 0 0 0-1.414 1.414l.707.707a1 1 0 0 0 1.414 0z"/></svg>
        </button>
      </div>
    </div>

    {{ if .Site.Menus.main }}
    <nav class="site-nav">
      <ul class="menu">
        {{ range .Site.Menus.main }}
        <li><a href="{{ .URL | relURL }}">{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </nav>
    {{ end }}
    <hr/>

{{ partial "header.html" . }}
<div class="article-meta" style="position: relative;">
<h1><span class="title">{{ .Title | markdownify }}</span></h1>
{{ if (gt .Params.date 0) }}<div class="date" style="position: absolute; bottom: 5px; right: 15px; font-size: 0.85em; color: var(--muted); font-weight: normal; margin: 0;">{{ .Date.Format "2006/01/02" }}</div>{{ end }}
</div>

<main>
{{ .Content }}
</main>

{{ partial "footer.html" . }}
